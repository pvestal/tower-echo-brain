name: Release Automation

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate changelog
      run: |
        echo "## Echo Brain ${{ github.ref_name }}" > release_notes.md
        echo "" >> release_notes.md
        # Get changes since last tag
        PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1 || echo "")
        if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "${{ github.ref_name }}" ]; then
          echo "### Changes since $PREV_TAG:" >> release_notes.md
          git log --pretty=format:"- %s" "$PREV_TAG".."${{ github.ref_name }}" >> release_notes.md
        else
          echo "### Recent Changes:" >> release_notes.md
          git log --pretty=format:"- %s" -20 >> release_notes.md
        fi

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release create "${{ github.ref_name }}" \
          --title "Echo Brain ${{ github.ref_name }}" \
          --notes-file release_notes.md
