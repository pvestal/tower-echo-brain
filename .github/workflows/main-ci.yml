name: Main CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Lint with ruff
        run: ruff check src/ --output-format=github

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Syntax check all Python source files
        run: |
          python -c "
          import ast, pathlib, sys
          errors = []
          for p in sorted(pathlib.Path('src').rglob('*.py')):
              try:
                  ast.parse(p.read_text())
              except SyntaxError as e:
                  errors.append(f'{p}:{e.lineno}: {e.msg}')
          for p in sorted(pathlib.Path('tests').rglob('*.py')):
              try:
                  ast.parse(p.read_text())
              except SyntaxError as e:
                  errors.append(f'{p}:{e.lineno}: {e.msg}')
          if errors:
              print(f'::error::{len(errors)} syntax error(s) found')
              for e in errors:
                  print(f'::error file={e.split(\":\")[0]}::{e}')
              sys.exit(1)
          print(f'All Python files parse successfully')
          "

      - name: Run unit tests (non-integration)
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --timeout=30 \
            --ignore=tests/echo_brain_smoke_test.py \
            -k "not integration and not live and not smoke" \
            || echo "No matching unit tests found (smoke tests require live server)"

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check and build
        working-directory: frontend
        run: npm run build

  test-contracts:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install contract test dependencies
        working-directory: contract-tests/consumer
        run: npm ci

      - name: Run Pact consumer tests
        working-directory: contract-tests/consumer
        run: npx vitest run --reporter=verbose
