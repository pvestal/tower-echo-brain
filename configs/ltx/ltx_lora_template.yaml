job: extension
config:
  name: "ltx_custom_lora"
  process:
    - type: ltx_video_lora

model:
  name_or_path: "Lightricks/LTX-Video"
  revision: "refs/pr/18"
  quantize: true

network:
  type: "lora"
  linear: 16
  linear_alpha: 16

datasets:
  - folder_path: "/opt/tower-lora-studio/datasets/ltx_training"
    caption_ext: "txt"
    caption_dropout_rate: 0.05
    resolution: [768, 512, 121]

train:
  batch_size: 1
  steps: 500
  gradient_accumulation_steps: 1
  train_unet: true
  train_text_encoder: false
  gradient_checkpointing: true
  noise_scheduler: "ddpm"
  optimizer: "adamw8bit"
  lr: 1e-4

sample:
  sampler: "ddpm"
  sample_every: 100
  width: 768
  height: 512
  frames: 121
  prompts:
    - "a woman in cowgirl position"

save:
  dtype: "float16"
  save_every: 100
  filename_prefix: "ltx_lora"
